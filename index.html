<body>
    <h1>Đăng nhập</h1>
    <form id="form-login" method="POST" action="xulydangnhap.php">
        <label> email</label>
        <input type="email" name="email" id="email-input">
        <br>

        <label> mật khẩu</label>
        <input type="password" name="password" id="password-input">
        <br>
        <button type="submit" id="login-button" data-testid="login-submit">Đăng nhập</button>
    </form>
    <script>
        // Tìm phần tử có id "form-login" 
        const loginForm = document .getElementById('form-login');
        // Thêm sự kiện "submit" cho form đăng nhập
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); // chặn form gửi dữ liệu đi
            //thu thập thông tin trên các ô nhập liệu
            var email = document.getElementById('email-input').value;
            var password = document.getElementById('password-input').value;

            // Gọi hàm xử lý
            var thongbao = login(email, password);
            alert(thongbao);
        });
    </script>
